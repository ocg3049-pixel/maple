<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대화 일정 분석기</title>
<style>
:root {
  --primary: #4F46E5;
  --primary-dark: #4338CA;
  --primary-light: #EEF2FF;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #111827;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', sans-serif;
  background: #F0F2F5;
  color: var(--gray-800);
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
  color: white;
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  box-shadow: 0 2px 12px rgba(79,70,229,0.3);
}

header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
header p { font-size: 0.8rem; opacity: 0.85; margin-top: 0.1rem; }

.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  padding: 1.25rem;
  max-width: 1440px;
  margin: 0 auto;
}

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
}

.panel {
  background: white;
  border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--gray-200);
  font-weight: 700;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--gray-800);
  background: white;
}

.panel-header .icon {
  width: 28px; height: 28px;
  background: var(--primary-light);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
}

.panel-body { padding: 1.25rem; flex: 1; }

textarea {
  width: 100%;
  height: 380px;
  border: 1.5px solid var(--gray-300);
  border-radius: 10px;
  padding: 0.875rem 1rem;
  font-size: 0.88rem;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  font-family: inherit;
  color: var(--gray-800);
  transition: border-color 0.2s, box-shadow 0.2s;
}

textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
}

textarea::placeholder { color: var(--gray-500); }

.btn-row {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.875rem;
}

.btn {
  flex: 1;
  padding: 0.7rem 1rem;
  border: none;
  border-radius: 9px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: var(--gray-100);
  color: var(--gray-700);
  flex: 0 0 auto;
  font-size: 0.82rem;
}
.btn-secondary:hover { background: var(--gray-200); }

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.25rem;
  background: white;
}

.tab {
  padding: 0.7rem 1rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: all 0.15s;
  margin-bottom: -1px;
}

.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.tab:hover:not(.active) { color: var(--gray-700); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.result-body {
  padding: 1.25rem;
  height: 460px;
  overflow-y: auto;
}

/* Schedule cards */
.schedule-card {
  border: 1.5px solid var(--gray-200);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 0.875rem;
  transition: box-shadow 0.2s;
}
.schedule-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
.schedule-card:last-child { margin-bottom: 0; }

.schedule-card.confirmed { border-left: 4px solid var(--success); }
.schedule-card.modified  { border-left: 4px solid var(--warning); }
.schedule-card.cancelled { border-left: 4px solid var(--danger); opacity: 0.85; }

.card-head {
  background: var(--gray-50);
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--gray-200);
}

.event-tag {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--gray-600);
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
}
.badge.confirmed { background: #D1FAE5; color: #065F46; }
.badge.modified  { background: #FEF3C7; color: #92400E; }
.badge.cancelled { background: #FEE2E2; color: #991B1B; text-decoration: line-through; }

.card-body { padding: 0.875rem 1rem 1rem; }

.schedule-main-info {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 0.6rem;
}

.schedule-date {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gray-800);
}

.schedule-time {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.schedule-time.cancelled {
  color: var(--danger);
  text-decoration: line-through;
}

.schedule-desc {
  font-size: 0.83rem;
  color: var(--gray-600);
  margin-bottom: 0.1rem;
}

/* History timeline */
.history {
  margin-top: 0.875rem;
  padding-top: 0.875rem;
  border-top: 1px dashed var(--gray-200);
}

.history-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--gray-500);
  margin-bottom: 0.5rem;
}

.history-item {
  display: flex;
  gap: 0.6rem;
  padding: 0.4rem 0.5rem 0.4rem 0.75rem;
  border-left: 2.5px solid var(--gray-200);
  margin-bottom: 0.35rem;
  font-size: 0.8rem;
}

.history-item.initial  { border-left-color: var(--success); }
.history-item.modified { border-left-color: var(--warning); }
.history-item.cancelled{ border-left-color: var(--danger); }
.history-item.reverted { border-left-color: #6366F1; }

.hi-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-top: 0.3rem;
  flex-shrink: 0;
}
.initial  .hi-dot { background: var(--success); }
.modified .hi-dot { background: var(--warning); }
.cancelled .hi-dot { background: var(--danger); }
.reverted .hi-dot { background: #6366F1; }

.hi-content { flex: 1; min-width: 0; }
.hi-meta {
  display: flex;
  gap: 0.4rem;
  align-items: center;
  margin-bottom: 0.15rem;
}
.hi-speaker {
  font-weight: 700;
  color: var(--gray-700);
  font-size: 0.78rem;
}
.hi-action {
  font-size: 0.72rem;
  color: var(--gray-500);
  background: var(--gray-100);
  padding: 0.1rem 0.35rem;
  border-radius: 4px;
}
.hi-detail {
  color: var(--gray-800);
  font-size: 0.8rem;
  font-weight: 600;
}
.hi-change { color: var(--warning); font-size: 0.8rem; }
.hi-quote {
  font-size: 0.75rem;
  color: var(--gray-500);
  margin-top: 0.15rem;
  font-style: italic;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Conversation view */
.conv-turn {
  margin-bottom: 0.75rem;
  padding: 0.6rem 0.875rem;
  border-radius: 9px;
  border-left: 3px solid var(--gray-200);
  font-size: 0.84rem;
  line-height: 1.6;
}

.conv-turn.has-schedule {
  border-left-color: var(--primary);
  background: var(--primary-light);
}

.conv-turn.has-modification {
  border-left-color: var(--warning);
  background: #FFFBEB;
}

.conv-turn.has-cancellation {
  border-left-color: var(--danger);
  background: #FFF1F2;
}

.turn-speaker {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gray-500);
  margin-bottom: 0.25rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.turn-content { color: var(--gray-800); }

mark.date { background: #D1FAE5; padding: 0 3px; border-radius: 3px; color: #065F46; font-weight: 600; }
mark.time { background: #EDE9FE; padding: 0 3px; border-radius: 3px; color: #5B21B6; font-weight: 600; }
mark.event{ background: #DBEAFE; padding: 0 3px; border-radius: 3px; color: #1E40AF; font-weight: 600; }
mark.mod  { background: #FEF3C7; padding: 0 3px; border-radius: 3px; color: #92400E; font-weight: 600; }
mark.cancel { background: #FEE2E2; padding: 0 3px; border-radius: 3px; color: #991B1B; font-weight: 600; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.875rem;
  padding-bottom: 0.875rem;
  border-bottom: 1px solid var(--gray-200);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.75rem;
  color: var(--gray-600);
}

.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

/* Empty / count */
.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray-500);
}

.empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
.empty p { font-size: 0.9rem; }

.count-banner {
  background: var(--primary-light);
  border: 1px solid #C7D2FE;
  border-radius: 8px;
  padding: 0.6rem 0.875rem;
  font-size: 0.84rem;
  color: #3730A3;
  font-weight: 600;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>📅 대화 일정 분석기</h1>
    <p>대화 내용을 붙여넣으면 일정을 자동으로 추출하고 변경 이력을 분석합니다</p>
  </div>
</header>

<div class="main">

  <!-- 입력 패널 -->
  <div class="panel">
    <div class="panel-header">
      <div class="icon">💬</div>
      대화 내용 입력
    </div>
    <div class="panel-body">
      <textarea id="input"
        placeholder="대화 내용을 여기에 붙여넣기 하세요.

화자 형식 예시:
A: 다음 주 화요일 오전 10시에 회의 어떠세요?
B: 10시는 좀 어렵고 오후 2시로 변경 가능할까요?
A: 네, 오후 2시로 하죠.

또는 자유로운 형식도 지원됩니다:
홍팀장: 내일 오후 3시에 미팅 잡아요
김대리: 3시는 어렵고 4시 반으로 바꿔주실 수 있나요?
홍팀장: 알겠어요, 4시 반으로 할게요"></textarea>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="loadExample()">예시 불러오기</button>
        <button class="btn btn-primary" onclick="analyze()">🔍 일정 분석하기</button>
      </div>
    </div>
  </div>

  <!-- 결과 패널 -->
  <div class="panel" id="resultPanel">
    <div class="panel-header">
      <div class="icon">📋</div>
      분석 결과
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('schedules')">일정 목록</div>
      <div class="tab" onclick="switchTab('conversation')">대화 분석</div>
    </div>

    <div id="tab-schedules" class="tab-content active">
      <div class="result-body" id="scheduleList">
        <div class="empty">
          <div class="empty-icon">🗓️</div>
          <p>대화 내용을 입력하고<br>분석하기 버튼을 클릭하세요</p>
        </div>
      </div>
    </div>

    <div id="tab-conversation" class="tab-content">
      <div class="result-body" id="conversationView">
        <div class="empty">
          <div class="empty-icon">💬</div>
          <p>분석 결과가 여기에 표시됩니다</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// =============================================
// CORE DATA STRUCTURES
// =============================================

// Reference date: 2026-06-28 (Sunday)
const REF = new Date(2026, 5, 28);

// Global state
let state = { schedules: [], turns: [] };

// =============================================
// PARSING
// =============================================

function parseConversation(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const turns = [];
  let current = null;

  for (const line of lines) {
    // Match "이름:" or "A:" at start of line (also handle quoted content: A: "...")
    const m = line.match(/^([가-힣A-Za-z0-9_]{1,15})\s*[:：]\s*"?(.+?)"?\s*$/);
    if (m) {
      if (current) turns.push(current);
      const rawContent = m[2].trim().replace(/^"/, '').replace(/"$/, '');
      current = { speaker: m[1].trim(), content: rawContent, normalized: normalizeText(rawContent) };
    } else {
      const cleaned = line.replace(/^"/, '').replace(/"$/, '');
      if (current) {
        current.content += ' ' + cleaned;
        current.normalized = normalizeText(current.content);
      } else {
        turns.push({ speaker: '?', content: cleaned, normalized: normalizeText(cleaned) });
      }
    }
  }
  if (current) turns.push(current);

  return turns;
}

// =============================================
// NORMALIZATION
// =============================================

// Normalize dialect & abbreviations before parsing
function normalizeText(text) {
  return text
    .replace(/일욜/g, '일요일').replace(/토욜/g, '토요일')
    .replace(/화욜/g, '화요일').replace(/수욜/g, '수요일')
    .replace(/목욜/g, '목요일').replace(/금욜/g, '금요일')
    .replace(/월욜/g, '월요일')
    .replace(/내일모레/g, '모레')
    // "담주" / standalone "내 주" → "다음 주"
    .replace(/담주/g, '다음 주')
    .replace(/그다음\s*주/g, '다다음 주')
    // common typos / short forms
    .replace(/새벽/g, '오전')
    .replace(/퇴근\s*전/g, '오후')
    // negative contractions
    .replace(/안됩니다/g, '안 됩니다')
    .replace(/안돼요/g, '안 돼요');
}

// =============================================
// DATE COMPUTATION
// =============================================

function computeActualDate(dateObj) {
  if (!dateObj) return null;

  // Specific month/day
  if (dateObj.month && dateObj.day) {
    return `${dateObj.month}월 ${dateObj.day}일`;
  }

  const ref = new Date(REF);
  const refDay = ref.getDay(); // 0=Sun, 1=Mon, ...

  if (dateObj.relative === 'today')     { return fmtDate(ref); }
  if (dateObj.relative === 'tomorrow')  { ref.setDate(ref.getDate()+1); return fmtDate(ref); }
  if (dateObj.relative === 'dayAfter')  { ref.setDate(ref.getDate()+2); return fmtDate(ref); }
  if (dateObj.relative === 'dayAfter2') { ref.setDate(ref.getDate()+3); return fmtDate(ref); }

  if (dateObj.weekday) {
    const dayNum = { '월':1,'화':2,'수':3,'목':4,'금':5,'토':6,'일':0 }[dateObj.weekday];
    const prefix = (dateObj.weekPrefix || '').replace(/\s/g, '');

    let weekAdd = 0;
    if (prefix.includes('다다음') || prefix.includes('그다음'))  weekAdd = 2;
    else if (prefix.includes('다음') || prefix.includes('차주')) weekAdd = 1;
    // else: "이번 주" / no prefix

    let daysToTarget;
    if (refDay === 0) {
      // Today is Sunday — "이번 주" = the coming Mon-Sun
      daysToTarget = dayNum === 0 ? 7 : dayNum;
    } else {
      daysToTarget = (dayNum - refDay + 7) % 7;
      if (daysToTarget === 0) daysToTarget = 7;
    }
    daysToTarget += weekAdd * 7;

    ref.setDate(ref.getDate() + daysToTarget);
    return fmtDate(ref);
  }

  return null;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// =============================================
// DATE & TIME EXTRACTION
// =============================================

function extractDate(text) {
  // X월 X일
  let m = text.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if (m) {
    const obj = { display: `${m[1]}월 ${m[2]}일`, month: +m[1], day: +m[2], key: `${m[1]}-${m[2]}` };
    const actual = computeActualDate(obj);
    if (actual) obj.actual = actual;
    return obj;
  }

  // Relative days
  if (/오늘/.test(text) && !/오늘\s*(?:안에|중에?|까지|내로)/.test(text))
    return { display: '오늘', relative: 'today', key: 'today', actual: fmtDate(new Date(REF)) };
  if (/내일/.test(text))    { const d = new Date(REF); d.setDate(d.getDate()+1); return { display: '내일', relative: 'tomorrow', key: 'tomorrow', actual: fmtDate(d) }; }
  if (/모레/.test(text))    { const d = new Date(REF); d.setDate(d.getDate()+2); return { display: '모레', relative: 'dayAfter', key: 'dayAfter', actual: fmtDate(d) }; }
  if (/글피/.test(text))    { const d = new Date(REF); d.setDate(d.getDate()+3); return { display: '글피', relative: 'dayAfter2', key: 'dayAfter2', actual: fmtDate(d) }; }

  // 이번/다음/다다음/그다음 주 + 요일  OR  요일 full form (e.g., 화요일)
  // Strict match: require week-prefix OR explicit "요일" suffix to avoid
  // false matches on words like "전화(話)", "일정(日程)", "수업(授業)"
  m = text.match(/(다다음\s*주?|그다음\s*주?|다음\s*주?|이번\s*주?|금주|차주)\s*([월화수목금토일])(?:요일)?|([월화수목금토일])요일/);
  if (m) {
    const weekMap = { '월':'월요일','화':'화요일','수':'수요일','목':'목요일','금':'금요일','토':'토요일','일':'일요일' };
    const prefix = m[1] ? m[1].replace(/\s/g,'') : '';
    const dayChar = m[2] || m[3]; // m[2] when prefix present, m[3] when just "요일"
    const day = weekMap[dayChar];
    const obj = {
      display: (prefix ? prefix+' ' : '') + day,
      weekday: dayChar,
      weekPrefix: m[1] || '',
      key: (m[1]||'') + dayChar,
    };
    obj.actual = computeActualDate(obj);
    return obj;
  }

  return null;
}

// Build a time object helper
function mkTime(ap, h, min, raw) {
  const h24 = ap === '오후' && h < 12 ? h+12 : ap === '오전' && h === 12 ? 0 : h;
  const apLabel = ap || (h24 < 12 ? '오전' : '오후');
  const h12 = h24 > 12 ? h24-12 : h24 || 12;
  return {
    display: `${apLabel} ${h12}시${min ? ` ${min}분` : ''}`,
    hour24: h24, minute: min, raw,
    sortKey: h24*60+min,
  };
}

// Infer AM/PM for naked times using nearby text + contextText (prev turn)
function inferAP(text, contextText, matchIdx, h, convHasEvening, convHasMorning) {
  const nearby = text.slice(Math.max(0, matchIdx - 10), matchIdx);
  // Explicit nearby context always wins
  if (/저녁|밤|야간|오후|낮/.test(nearby)) return '오후';
  if (/오전|아침/.test(nearby)) return '오전';
  // Hours 1–5: almost always PM in scheduling
  if (h >= 1 && h <= 5) return '오후';
  // Hour 6: AM if early-morning context (새벽→오전 after normalization)
  if (h === 6) {
    const fullCtx = (contextText || '') + ' ' + text;
    if (/오전\s*6|새벽\s*6|이른\s*아침|등산|등반|산행|새벽\s*출발|오전\s*출발/.test(fullCtx)) return '오전';
    if (convHasMorning && !convHasEvening) return '오전';
    return '오후';
  }
  // Hours 7–11: check if current, prev turn, or any earlier turn has evening context
  if (h >= 7 && h <= 11) {
    const hasMorning = /오전|아침|출근\s*전|개장|첫\s*타임|문\s*열|금식|공복/.test(text);
    const fullCtx = (contextText || '') + ' ' + text;
    const hasEvening = convHasEvening || /저녁|밤|야간|회식/.test(fullCtx);
    // Dining/social venue or reservation group in nearby text → PM for h=7-9
    if (h <= 9 && !hasMorning) {
      const nearCtx = text.slice(Math.max(0, matchIdx - 60), matchIdx + 60);
      if (/고깃집|이자카야|술집|레스토랑|포차|호프|맥줏집|디너|dinner|카페에서|보드게임카페|노쇼|자동\s*취소|홀\s*테이블|자리는|자리\s*잡|좌석|\d\s*명\s*(?:이|예약|잡|자리)|예약.*?\d\s*명|\d\s*명.*?예약|인원.*?예약|예약.*?인원/.test(nearCtx)) return '오후';
    }
    if (hasEvening && !hasMorning) return '오후';
  }
  return null; // keep raw hour (AM by default for h<12)
}

// End-time filter: "X시부터 Y시까지/종료" — Y시 is end time, not event time
function isEndTime(text, hour) {
  const h12 = hour > 12 ? hour - 12 : hour;
  const hrs = [...new Set([hour, h12])];
  const hasStart = /\d+\s*시\s*(?:반)?\s*(?:부터|시작|부터\s*시작)/.test(text);
  for (const h of hrs) {
    if (hasStart && new RegExp(`${h}\\s*시(?:\\s*반)?\\s*(?:까지|종료|끝나|마감|종강|폐장)`).test(text)) return true;
    if (new RegExp(`${h}\\s*시(?:\\s*반)?\\s*(?:종료|끝나는\\s*시간)`).test(text)) return true;
  }
  return false;
}

// Detect arrival/entry time: "10시 55분에 입장" → prefer this over later "시작" time
function detectArriveTime(text) {
  const m = text.match(/(\d{1,2})\s*시\s*(?:(\d{1,2})\s*분)?\s*(?:에\s*)?(?:입장|도착해서|들어와서|오셔서)/);
  if (m) return { h: +m[1], min: m[2] ? +m[2] : 0 };
  return null;
}

// Conditional time filter: "9시 반 확정되면" → 9:30 is not yet confirmed
function isConditionalTime(text, hour, minute) {
  const h12 = hour > 12 ? hour - 12 : hour;
  const hrs = [...new Set([hour, h12])];
  for (const h of hrs) {
    if (minute === 30) {
      if (new RegExp(`${h}\\s*시\\s*반\\s*(?:확정되면|확정이면|되면\\s*알려|되면\\s*연락)`).test(text)) return true;
    } else {
      if (new RegExp(`${h}\\s*시(?!\\s*반)\\s*(?:확정되면|확정이면|되면\\s*알려|되면\\s*연락)`).test(text)) return true;
    }
  }
  return false;
}

// Extract multiple times from text — order: range > ampm > X시반 > X시Y분 > HH:MM > named
// contextText: previous turn's text for cross-turn AM/PM inference
// convHasEvening: true if any earlier turn in the conversation had 저녁/밤 context
// convHasMorning: true if any earlier turn had 새벽/이른아침 context (pre-normalization)
function extractAllTimes(text, contextText, convHasEvening, convHasMorning) {
  const results = [];

  // p0: X~Y시 ranges (e.g. "9~12시", "2~4시") → extract start time only
  const p0 = /(\d{1,2})~(\d{1,2})\s*시/g;
  let m;
  while ((m = p0.exec(text)) !== null) {
    const hStart = +m[1];
    if (hStart >= 1 && hStart <= 23) {
      const ap = inferAP(text, contextText, m.index, hStart, convHasEvening, convHasMorning);
      results.push({ index: m.index, end: m.index+m[0].length, raw: m[0],
        ...mkTime(ap, hStart, 0, m[0]) });
    }
  }

  // p1: 오전/오후 X시 [Y분]
  const p1 = /(오전|오후)\s*(\d{1,2})\s*시\s*(반|\d{1,2}\s*분)?/g;
  while ((m = p1.exec(text)) !== null) {
    const ap = m[1], h = +m[2];
    const minStr = m[3];
    const min = minStr === '반' ? 30 : (minStr ? parseInt(minStr) : 0);
    results.push({ index: m.index, end: m.index+m[0].length, raw: m[0],
      ...mkTime(ap, h, min, m[0]) });
  }

  const covered = idx => results.some(r => idx >= r.index && idx < r.end);

  // p2: X시 반 (must be before X시Y분 to cover "8시 반")
  const p2 = /(\d{1,2})\s*시\s*반(?!\s*\d)/g;
  while ((m = p2.exec(text)) !== null) {
    if (!covered(m.index)) {
      const h = +m[1];
      if (h >= 1 && h <= 23) {
        const ap = inferAP(text, contextText, m.index, h, convHasEvening, convHasMorning);
        results.push({ index: m.index, end: m.index+m[0].length, raw: m[0],
          ...mkTime(ap, h, 30, m[0]) });
      }
    }
  }

  // p3: X시 [Y분]  (after p2 so "8시 반" already covered)
  const p3 = /(\d{1,2})\s*시\s*(?:(\d{1,2})\s*분)?(?!\s*간)(?!\s*반)/g;
  while ((m = p3.exec(text)) !== null) {
    if (!covered(m.index)) {
      const h = +m[1], min = m[2] ? +m[2] : 0;
      if (h >= 1 && h <= 23) {
        const ap = inferAP(text, contextText, m.index, h, convHasEvening, convHasMorning);
        results.push({ index: m.index, end: m.index+m[0].length, raw: m[0],
          ...mkTime(ap, h, min, m[0]) });
      }
    }
  }

  // p4: HH:MM
  const p4 = /(?<!\d)(\d{1,2}):(\d{2})(?!\d)/g;
  while ((m = p4.exec(text)) !== null) {
    if (!covered(m.index)) {
      const h = +m[1], min = +m[2];
      if (h >= 0 && h <= 23 && min >= 0 && min <= 59) {
        results.push({ index: m.index, end: m.index+m[0].length, raw: m[0],
          ...mkTime(null, h, min, m[0]) });
      }
    }
  }

  // Named times (only when no explicit time found)
  if (results.length === 0) {
    if (/정오/.test(text)) results.push({ index:0, end:0, raw:'정오', display:'정오(12:00)', hour24:12, minute:0, sortKey:720 });
    else if (/자정/.test(text)) results.push({ index:0, end:0, raw:'자정', display:'자정(0:00)', hour24:0, minute:0, sortKey:0 });
    else if (/점심/.test(text) && /예약|부킹/.test(text) && !/점심\s*이후|점심\s*후/.test(text))
      results.push({ index:0, end:0, raw:'점심', ...mkTime('오후', 12, 0, '점심') });
  }

  results.sort((a,b) => a.index - b.index);
  return results;
}

function detectEventType(text) {
  if (/회의|미팅|회의실|meeting|킥오프|kickoff/i.test(text))        return { label: '회의', icon: '📊' };
  if (/식당|예약|식사|점심|저녁|아침|밥|먹|고깃집|카페|커피|돌잔치|상견례|회식|송별회/i.test(text)) return { label: '식사', icon: '🍽️' };
  if (/통화|전화|콜|call/i.test(text))                              return { label: '전화', icon: '📞' };
  if (/발표|보고|프레젠|IR|PT/i.test(text))                         return { label: '발표', icon: '📣' };
  if (/수업|강의|클래스|과외|레슨|강습|PT|트레이닝/i.test(text))     return { label: '수업', icon: '📚' };
  if (/병원|진료|검진|치료|치과|스케일링|예방접종|MRI/i.test(text)) return { label: '병원', icon: '🏥' };
  if (/면접|채용/i.test(text))                                      return { label: '면접', icon: '👔' };
  if (/골프|라운딩|부킹/i.test(text))                               return { label: '골프', icon: '⛳' };
  if (/AS|수리|기사|배송|설치|점검|정비|카센터|타이어|오일|세탁기|보일러/i.test(text)) return { label: '방문수리', icon: '🔧' };
  if (/이사|포장/i.test(text))                                      return { label: '이사', icon: '📦' };
  if (/약속|만남|만나|모임|데이트|영화|공연|콘서트|전시/i.test(text)) return { label: '약속', icon: '🤝' };
  return { label: '일정', icon: '📅' };
}

function isModificationTurn(text) {
  return /(변경|수정|바꿔|바꾸|바뀌|미뤄|미루|연기|앞당기|앞당겨|아니라|대신|말고|→|->|옮겨|조정|늦춰|당겨)/.test(text);
}

function isCancellationTurn(text) {
  return /(취소|안\s*될\s*것|불참|어렵겠|힘들겠|안\s*되겠|안되겠|철회|못\s*(?:갈|올|할|하겠))/.test(text);
}

function isConfirmationTurn(text) {
  return /(확정|확인|알겠|좋아요|ㅇㅋ|오케|오케이|콜\b|그렇게\s*하죠|그렇게\s*할게|그럼\s*그걸로|그걸로\s*주세요|그렇게요)/.test(text);
}

// Detect if a specific hour is rejected in context
// e.g. "4시에는 다른 미팅이", "7시는 만석", "8시는 끝나면 너무 늦어"
function isTimeRejectedInContext(text, hour) {
  // "X시 반" rejection uses same hour
  const re = new RegExp(
    `${hour}\\s*시(?:\\s*반)?[에는가이은]?\\s*(` +
    `다른|못|안\\s*\\S+|불가|어렵|미팅이?\\s*있|약속이?\\s*있|일정이?\\s*있|회의가?\\s*있|수업이?\\s*있|` +
    `만석|꽉\\s*찼|예약\\s*마감|마감|이르|너무\\s*이르|촉박|너무\\s*늦|늦어|휴무|이미|` +
    `안됩|안돼|됩니다(?!\\s*[가-힣])|없어요|없습니다|불가능|어려워` +
    `)`
  );
  return re.test(text);
}

// Detect "그걸로/그것으로" — accepting the previous turn's last offered time
function isPreviousAcceptance(text) {
  return /(그걸로|그것으로|그\s*시간으로|그때로|그날로|그렇게\s*할게|그걸\s*주세요|말씀하신\s*대로|말씀대로|그러면\s*그걸로|방금\s*말씀|그렇게요)/.test(text);
}

// Detect "원래대로" / revert-to-original signal
function isRevertSignal(text) {
  return /(원래대로|기존대로|처음대로|전대로|그냥\s*그대로|하던\s*대로|기존으로|원래로)/.test(text);
}

// Detect "같은 시간" / "그대로" — keep current time unchanged
function isSameTimeSignal(text) {
  return /(같은\s*시간|시간은?\s*그대로|시간\s*그대로|그\s*시간\s*그대로|그대로고요|기존\s*시간)/.test(text);
}

// Detect explicit time finalization: "X시로 하자/합시다/할게요/잡았어"
// Returns the finalized hour (or null)
function detectExplicitFinalHour(text) {
  const m = text.match(/(\d{1,2})\s*시\s*(?:반\s*)?(?:로|으로|에)\s*(하자|할게|합시다|하죠|주세요|해주세요|잡자|잡을게|잡아요|확정|할게요|해요|잡았어|잡았어요|잡았다|잡았습니다|예약됐어|확정됐어)/);
  if (m) return +m[1];
  return null;
}

// Detect implicit "today" from conversational context clues
function isImplicitlyToday(text) {
  return /(점심\s*먹고|저녁\s*먹고|밥\s*먹고|아침\s*먹고|이따가|이따|조금\s*있다가|좀\s*있다가|지금\s*바로|지금\s*당장|잠깐\s*있다가|오늘\s*중|오늘\s*안으로|퇴근\s*후|퇴근\s*하고|수업\s*끝나고|수업\s*후|방과\s*후|회의\s*끝나고|회의\s*후|식사\s*후|식사\s*하고|커피\s*마시고)/.test(text);
}

// Detect preparation/arrival times that should not be used as event times
// e.g. "7시까지 도착", "7시부터 금식" — these are constraints, not the event itself
function isPrepTime(text, hour) {
  const re = new RegExp(`${hour}\\s*시(?:\\s*반)?\\s*(?:부터|까지)\\s*(?:금식|공복|준비|도착|오세요|오시면|출발)`);
  return re.test(text);
}

// =============================================
// SCHEDULE ANALYSIS ENGINE
// =============================================

function analyzeSchedules(turns) {
  const schedules = [];
  const lookup = {}; // hour24 → schedule index
  let convHasEvening = false; // track if any turn mentioned 저녁/밤 context
  let convHasMorning = false; // track if any turn mentioned 새벽/이른 아침 context

  const updateScheduleTime = (sc, idx, newTime) => {
    if (!newTime) return;
    if (sc.currentTime) delete lookup[sc.currentTime.hour24];
    sc.currentTime = newTime;
    if (newTime.hour24 !== undefined) lookup[newTime.hour24] = idx;
  };

  for (let i = 0; i < turns.length; i++) {
    const { speaker, content } = turns[i];
    const txt = turns[i].normalized || content; // use dialect-normalized text
    const prevTxt = i > 0 ? (turns[i-1].normalized || turns[i-1].content) : '';

    // Update conversation-level evening/morning context before time extraction
    if (/저녁|밤|야간|회식|디너|dinner|저녁식사/.test(txt)) convHasEvening = true;
    // Use original content (before normalization) to detect 새벽 context
    if (/새벽|이른\s*아침|등산|등반|산행/.test(content)) convHasMorning = true;

    const date = extractDate(txt);
    const rawTimes = extractAllTimes(txt, prevTxt, convHasEvening, convHasMorning);
    const eventType = detectEventType(txt);

    const isModify  = isModificationTurn(txt);
    const isCancel  = isCancellationTurn(txt);
    const isConfirm = isConfirmationTurn(txt);
    const isRevert  = isRevertSignal(txt);
    const isSame    = isSameTimeSignal(txt);
    const isAccPrev = isPreviousAcceptance(txt);

    // Filter times that appear in rejection / prep / end-time / conditional context
    const rejectedTimes = rawTimes.filter(t => isTimeRejectedInContext(txt, t.hour24));
    const nonRejTimes   = rawTimes.filter(t =>
      !isTimeRejectedInContext(txt, t.hour24) &&
      !isPrepTime(txt, t.hour24) &&
      !isEndTime(txt, t.hour24) &&
      !isConditionalTime(txt, t.hour24, t.minute || 0)
    );

    // Effective time: prefer arrival time > explicit finalized hour > last non-rejected
    const finalHour = detectExplicitFinalHour(txt);
    const arriveTime = detectArriveTime(txt);
    let effectiveTimes = nonRejTimes;
    if (arriveTime) {
      const arrMatch = nonRejTimes.find(t => t.hour24 === arriveTime.h && (t.minute || 0) === arriveTime.min);
      if (arrMatch) effectiveTimes = [arrMatch];
    } else if (finalHour !== null) {
      const finTime = nonRejTimes.find(t => t.hour24 === finalHour || t.hour24 === finalHour+12);
      if (finTime) effectiveTimes = [finTime];
    }
    const proposedTime = effectiveTimes.length > 0 ? effectiveTimes[effectiveTimes.length - 1] : null;
    // When all mentioned times are rejected, keep no proposed time
    const hasOnlyRejected = rawTimes.length > 0 && effectiveTimes.length === 0;

    // ── 1. "그걸로" — adopt previous turn's last non-rejected time ──────────
    if (isAccPrev && schedules.length > 0) {
      const prevNonRej = extractAllTimes(prevTxt, i > 1 ? (turns[i-2].normalized || turns[i-2].content) : '', convHasEvening, convHasMorning)
        .filter(t => !isTimeRejectedInContext(prevTxt, t.hour24));
      const adoptTime = prevNonRej.length > 0 ? prevNonRej[prevNonRej.length - 1] : null;

      if (adoptTime || date) {
        const tIdx = findClosestSchedule(schedules, date, eventType);
        if (tIdx !== null) {
          const sc = schedules[tIdx];
          const adoptDate = date || sc.currentDate;
          sc.history.push({ type: 'confirmed', speaker, content,
            oldTime: sc.currentTime, newTime: adoptTime || sc.currentTime, newDate: adoptDate });
          if (adoptDate) sc.currentDate = adoptDate;
          if (adoptTime) updateScheduleTime(sc, tIdx, adoptTime);
          sc.status = 'confirmed';
          sc.lastTurnIndex = i;
          turns[i]._annotation = 'has-schedule';
          continue;
        }
      }
    }

    // ── 2. Modification / Cancellation ──────────────────────────────────────
    if (isModify || isCancel) {
      // Explicit "X시에서 Y시로" / "X시 → Y시" pattern
      const explicitChange = txt.match(
        /(\d{1,2})\s*시(?:\s*반)?\s*(?:에서|→|->|를|을|이|가)\s*(?:오전|오후)?\s*(\d{1,2})\s*시/
      );

      if (explicitChange) {
        const oldH = +explicitChange[1];
        const tIdx = lookup[oldH] !== undefined ? lookup[oldH] : findClosestSchedule(schedules, null, eventType);
        if (tIdx !== null && tIdx !== undefined) {
          const sc = schedules[tIdx];
          sc.history.push({ type: isCancel ? 'cancelled' : 'modified', speaker, content,
            oldTime: sc.currentTime, newTime: proposedTime, newDate: date });
          if (date) sc.currentDate = date;
          updateScheduleTime(sc, tIdx, proposedTime);
          sc.status = isCancel ? 'cancelled' : 'modified';
          turns[i]._annotation = isCancel ? 'has-cancellation' : 'has-modification';
          continue;
        }
      }

      // Generic modification — find best matching existing schedule
      if (proposedTime || date) {
        const tIdx = findClosestSchedule(schedules, date, eventType);
        if (tIdx !== null) {
          const sc = schedules[tIdx];
          sc.history.push({ type: isCancel ? 'cancelled' : 'modified', speaker, content,
            oldTime: sc.currentTime, newTime: proposedTime, newDate: date });
          if (date) sc.currentDate = date;
          if (!isSame) updateScheduleTime(sc, tIdx, proposedTime);
          sc.status = isCancel ? 'cancelled' : 'modified';
          turns[i]._annotation = isCancel ? 'has-cancellation' : 'has-modification';
          continue;
        }
      }
      // Pure cancellation with no new time/date — still mark as cancelled
      if (isCancel && schedules.length > 0) {
        const tIdx = findClosestSchedule(schedules, date, eventType);
        if (tIdx !== null) {
          const sc = schedules[tIdx];
          sc.history.push({ type: 'cancelled', speaker, content, oldTime: sc.currentTime });
          sc.status = 'cancelled';
          turns[i]._annotation = 'has-cancellation';
          continue;
        }
      }
    }

    // ── 3. Confirmation ─────────────────────────────────────────────────────
    if (isConfirm && schedules.length > 0) {
      const tIdx = findClosestSchedule(schedules, date, eventType);
      if (tIdx !== null) {
        const sc = schedules[tIdx];
        // Don't re-confirm a cancelled schedule
        if (sc.status === 'cancelled') { turns[i]._annotation = 'has-schedule'; continue; }
        sc.history.push({ type: 'confirmed', speaker, content,
          oldTime: sc.currentTime, newTime: proposedTime || sc.currentTime, newDate: date });
        if (date) sc.currentDate = date;
        if (proposedTime && !isSame) updateScheduleTime(sc, tIdx, proposedTime);
        sc.status = 'confirmed';
        turns[i]._annotation = 'has-schedule';
        continue;
      }
    }

    // ── 4. Revert / "원래대로" ───────────────────────────────────────────────
    if (isRevert && schedules.length > 0) {
      const tIdx = findClosestSchedule(schedules, date, eventType);
      if (tIdx !== null) {
        const sc = schedules[tIdx];
        // If explicit new time mentioned alongside "원래대로" → use that time
        // Otherwise keep current time (pure revert)
        const revertTime = proposedTime || sc.currentTime;
        const revertDate = date || sc.currentDate;
        sc.history.push({ type: 'reverted', speaker, content,
          oldTime: sc.currentTime, newTime: revertTime });
        sc.currentDate = revertDate;
        updateScheduleTime(sc, tIdx, revertTime);
        sc.status = 'confirmed';
        turns[i]._annotation = 'has-schedule';
        continue;
      }
    }

    // ── 5. All-rejected times — still try to acknowledge existing schedule ──
    if (hasOnlyRejected && schedules.length > 0) {
      // B is rejecting ALL proposed times but not offering a new one → keep status
      turns[i]._annotation = 'has-modification';
      continue;
    }

    // ── 6. "같은 시간" — no time change, possibly date change ───────────────
    if (isSame && schedules.length > 0) {
      const tIdx = findClosestSchedule(schedules, date, eventType);
      if (tIdx !== null && date) {
        const sc = schedules[tIdx];
        sc.history.push({ type: 'modified', speaker, content,
          oldTime: sc.currentTime, newTime: sc.currentTime, newDate: date });
        sc.currentDate = date;
        turns[i]._annotation = 'has-modification';
        continue;
      }
    }

    // ── 6.5. Date-only update: fill date into existing dateless schedule ──────
    if (date && !proposedTime && !isCancel && schedules.length > 0) {
      const tIdx = findClosestSchedule(schedules, null, eventType);
      if (tIdx !== null) {
        const sc = schedules[tIdx];
        if (!sc.currentDate && sc.currentTime) {
          sc.currentDate = date;
          sc.lastTurnIndex = i;
          turns[i]._annotation = 'has-schedule';
          continue;
        }
      }
    }

    // ── 7. Counter-proposal or new schedule ─────────────────────────────────
    if (date || proposedTime) {
      const todayDate = { display: '오늘', relative: 'today', key: 'today', actual: fmtDate(new Date(REF)) };
      const effectiveDate = date || (isImplicitlyToday(txt) ? todayDate : null);

      // Counter-proposal: no date context, close to a recent schedule
      if (schedules.length > 0 && !effectiveDate && proposedTime) {
        const recentIdx = findClosestSchedule(schedules, null, eventType);
        if (recentIdx !== null && i - (schedules[recentIdx].lastTurnIndex || 0) <= 5) {
          const sc = schedules[recentIdx];
          sc.history.push({ type: 'modified', speaker, content,
            oldTime: sc.currentTime, newTime: proposedTime, newDate: null });
          updateScheduleTime(sc, recentIdx, proposedTime);
          sc.status = 'modified';
          sc.lastTurnIndex = i;
          turns[i]._annotation = 'has-modification';
          continue;
        }
      }

      // Same date as existing schedule → update that schedule instead of creating new
      if (effectiveDate && schedules.length > 0 && proposedTime) {
        let dateMatchIdx = null;
        for (let j = schedules.length - 1; j >= 0; j--) {
          const s = schedules[j];
          if (s.currentDate && s.currentDate.actual === effectiveDate.actual
              && s.eventType.label === eventType.label) {
            dateMatchIdx = j; break;
          }
        }
        if (dateMatchIdx !== null) {
          const sc = schedules[dateMatchIdx];
          sc.history.push({ type: 'modified', speaker, content,
            oldTime: sc.currentTime, newTime: proposedTime, newDate: effectiveDate });
          updateScheduleTime(sc, dateMatchIdx, proposedTime);
          sc.currentDate = effectiveDate;
          sc.status = 'modified';
          sc.lastTurnIndex = i;
          turns[i]._annotation = 'has-modification';
          continue;
        }
      }

      // Create new schedule
      const newSc = {
        id: schedules.length,
        eventType,
        currentDate: effectiveDate,
        currentTime: proposedTime,
        status: 'confirmed',
        lastTurnIndex: i,
        history: [{
          type: 'initial', speaker, content,
          date: effectiveDate, time: proposedTime,
          dateInferred: !date && !!effectiveDate,
        }],
      };
      schedules.push(newSc);
      const newIdx = schedules.length - 1;
      if (proposedTime && proposedTime.hour24 !== undefined) lookup[proposedTime.hour24] = newIdx;
      turns[i]._annotation = 'has-schedule';
    }
  }

  return schedules;
}

function findClosestSchedule(schedules, date, eventType) {
  if (schedules.length === 0) return null;

  // Prefer: same event type + same date
  if (date) {
    for (let i = schedules.length - 1; i >= 0; i--) {
      if (schedules[i].eventType.label === eventType.label &&
          schedules[i].currentDate && schedules[i].currentDate.key === date.key) {
        return i;
      }
    }
  }

  // Same event type (most recent)
  for (let i = schedules.length - 1; i >= 0; i--) {
    if (schedules[i].eventType.label === eventType.label) return i;
  }

  // Most recent schedule
  return schedules.length - 1;
}

// =============================================
// RENDERING
// =============================================

function renderSchedules(schedules) {
  const el = document.getElementById('scheduleList');

  if (schedules.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>일정을 찾지 못했습니다.<br>날짜나 시간 정보가 포함된 대화를 입력해주세요.</p></div>`;
    return;
  }

  const statusCount = schedules.reduce((acc, s) => { acc[s.status] = (acc[s.status]||0)+1; return acc; }, {});
  const parts = [];
  if (statusCount.confirmed) parts.push(`확정 ${statusCount.confirmed}건`);
  if (statusCount.modified) parts.push(`변경 ${statusCount.modified}건`);
  if (statusCount.cancelled) parts.push(`취소 ${statusCount.cancelled}건`);

  let html = `<div class="count-banner">📊 총 ${schedules.length}개 일정 발견 &mdash; ${parts.join(', ')}</div>`;
  html += schedules.map(renderCard).join('');
  el.innerHTML = html;
}

function renderCard(sc) {
  const statusLabel = { confirmed: '✅ 확정', modified: '⚠️ 변경됨', cancelled: '❌ 취소됨' }[sc.status];
  const actualDate = sc.currentDate && sc.currentDate.actual ? ` (${sc.currentDate.actual})` : '';
  const dateStr = sc.currentDate ? sc.currentDate.display + actualDate : '날짜 미정';
  const timeStr = sc.currentTime ? sc.currentTime.display : '시간 미정';

  const historyHtml = sc.history.map(h => {
    const actionLabel = {
      initial: '최초 등록', modified: '변경', cancelled: '취소',
      confirmed: '확정', reverted: '제안 거절 · 유지'
    }[h.type] || h.type;
    let detail = '';
    if (h.type === 'initial') {
      const d = h.date ? h.date.display + (h.dateInferred ? ' (맥락 추론)' : '') : '';
      const t = h.time ? h.time.display : '';
      detail = `<div class="hi-detail">${[d, t].filter(Boolean).join(' ')}</div>`;
    } else if (h.type === 'modified' || h.type === 'cancelled') {
      const from = h.oldTime ? h.oldTime.display : '?';
      const to = h.newTime ? h.newTime.display : '';
      const dateChange = h.newDate ? `${h.newDate.display} ` : '';
      if (from && to && from !== to) {
        detail = `<div class="hi-change">⟶ ${dateChange}${to} <span style="opacity:0.6;font-size:0.75rem;">(기존: ${from})</span></div>`;
      } else if (to) {
        detail = `<div class="hi-change">⟶ ${dateChange}${to}</div>`;
      } else if (dateChange) {
        detail = `<div class="hi-change">⟶ ${dateChange}</div>`;
      }
    } else if (h.type === 'confirmed') {
      detail = `<div class="hi-detail" style="color:var(--success);">확정</div>`;
    } else if (h.type === 'reverted') {
      const kept = h.newTime ? h.newTime.display : '기존 시간';
      detail = `<div class="hi-detail" style="color:#6366F1;">↩ 변경 제안 거절 → <strong>${kept}</strong> 유지</div>`;
    }
    const quote = `"${h.content.substring(0, 70)}${h.content.length > 70 ? '…' : ''}"`;
    const itemCls = h.type === 'confirmed' ? 'initial' : h.type; // confirmed uses green dot
    return `
    <div class="history-item ${itemCls}">
      <div class="hi-dot"></div>
      <div class="hi-content">
        <div class="hi-meta">
          <span class="hi-speaker">${h.speaker}</span>
          <span class="hi-action">${actionLabel}</span>
        </div>
        ${detail}
        <div class="hi-quote">${quote}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="schedule-card ${sc.status}">
    <div class="card-head">
      <span class="event-tag">${sc.eventType.icon} ${sc.eventType.label}</span>
      <span class="badge ${sc.status}">${statusLabel}</span>
    </div>
    <div class="card-body">
      <div class="schedule-main-info">
        <span class="schedule-date">📆 ${dateStr}</span>
        <span class="schedule-time ${sc.status === 'cancelled' ? 'cancelled' : ''}">⏰ ${timeStr}</span>
      </div>
      ${sc.history.length > 1 ? `<div class="history"><div class="history-label">변경 이력 (${sc.history.length}건)</div>${historyHtml}</div>` : `<div class="history">${historyHtml}</div>`}
    </div>
  </div>`;
}

function renderConversationView(turns) {
  const el = document.getElementById('conversationView');

  const legend = `
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#D1FAE5;border:1px solid #10B981"></div> 날짜</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EDE9FE;border:1px solid #7C3AED"></div> 시간</div>
    <div class="legend-item"><div class="legend-dot" style="background:#DBEAFE;border:1px solid #3B82F6"></div> 이벤트</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FEF3C7;border:1px solid #F59E0B"></div> 변경</div>
    <div class="legend-item"><div class="legend-dot" style="background:#FEE2E2;border:1px solid #EF4444"></div> 취소</div>
  </div>`;

  const turnsHtml = turns.map(t => {
    const cls = t._annotation || '';
    const highlighted = highlightContent(t.content);
    const speakerHtml = t.speaker !== '?' ? `<div class="turn-speaker">${escHtml(t.speaker)}</div>` : '';
    return `<div class="conv-turn ${cls}">${speakerHtml}<div class="turn-content">${highlighted}</div></div>`;
  }).join('');

  el.innerHTML = legend + turnsHtml;
}

function highlightContent(text) {
  // Order matters: longer patterns first
  const rules = [
    // Dates
    { re: /(\d{1,2}월\s*\d{1,2}일)/g, cls: 'date' },
    { re: /(\d{1,2}\/\d{1,2})/g, cls: 'date' },
    { re: /(오늘|내일|모레|글피)/g, cls: 'date' },
    { re: /((이번\s*주?|다음\s*주?|금주|차주)?\s*[월화수목금토일]요일?)/g, cls: 'date' },
    // Times
    { re: /((오전|오후)\s*\d{1,2}\s*시\s*(?:반|\d{1,2}\s*분)?)/g, cls: 'time' },
    { re: /(\d{1,2}\s*시\s*(?:반|\d{1,2}\s*분)?(?!\s*간))/g, cls: 'time' },
    { re: /(\d{1,2}:\d{2})/g, cls: 'time' },
    // Modification keywords
    { re: /(변경|수정|바꿔|바꾸|바뀌|미뤄|연기|앞당기|앞당겨|아니라|말고|→|->)/g, cls: 'mod' },
    { re: /(취소|불참|어렵겠|힘들겠|안\s*되겠|불가)/g, cls: 'cancel' },
    // Revert/rejection keywords
    { re: /(원래대로|기존대로|처음대로|전대로|그냥\s*그대로|하던\s*대로)/g, cls: 'mod' },
    // Implicit today indicators
    { re: /(점심\s*먹고|저녁\s*먹고|밥\s*먹고|이따가|이따|조금\s*있다가|좀\s*있다가|지금\s*바로|퇴근\s*후|퇴근\s*하고)/g, cls: 'date' },
    // Events
    { re: /(회의|미팅|점심|저녁|약속|모임|발표|수업|병원|통화|전화)/g, cls: 'event' },
    // Confirmation
    { re: /(확정|확인|알겠|좋아요|그럼\s*그렇게|그걸로)/g, cls: 'date' },
  ];

  let result = escHtml(text);

  // We'll do a simple replacement pass — note: this can overlap, but good enough for display
  for (const { re, cls } of rules) {
    result = result.replace(re, (m) => `<mark class="${cls}">${m}</mark>`);
  }
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

function analyze() {
  const text = document.getElementById('input').value.trim();
  if (!text) { alert('대화 내용을 입력해주세요.'); return; }

  const turns = parseConversation(text);
  const schedules = analyzeSchedules(turns);

  state = { schedules, turns };

  renderSchedules(schedules);
  renderConversationView(turns);
}
